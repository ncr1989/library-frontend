<div class="min-vh-100 bg-light">

  <app-navbar></app-navbar>

  <div class="container-fluid px-4 py-4">

    <div *ngIf="successMessage" class="alert alert-success alert-dismissible">
      {{ successMessage }}<button class="btn-close" (click)="successMessage=''"></button>
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible">
      {{ errorMessage }}<button class="btn-close" (click)="errorMessage=''"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="fw-bold mb-0">Gestion des ouvrages</h4>
      <button class="btn btn-primary" (click)="openAdd()">+ Ajouter un ouvrage</button>
    </div>

    <div class="d-flex gap-2 mb-3">
      <input type="text" class="form-control" style="max-width:300px;"
        placeholder="Rechercher par titre..."
        [(ngModel)]="searchTerm" (ngModelChange)="applyFilter()" />
      <select class="form-select" style="max-width:160px;"
        [(ngModel)]="selectedType" (ngModelChange)="applyFilter()">
        <option value="">Tous les types</option>
        <option value="LIVRE">Livre</option>
        <option value="REVUE">Revue</option>
      </select>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Titre</th>
              <th>Type</th>
              <th>Année</th>
              <th>Caution</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="loading">
              <td colspan="5" class="text-center py-4">
                <div class="spinner-border text-primary"></div>
              </td>
            </tr>
            <tr *ngIf="!loading && filtered.length === 0">
              <td colspan="5" class="text-center py-4 text-muted">Aucun ouvrage trouvé.</td>
            </tr>
            <tr *ngFor="let o of filtered">
              <td class="fw-semibold">{{ o.titre }}</td>
              <td><span class="badge rounded-pill" [ngClass]="getTypeBadge(o)">{{ getTypeLabel(o) }}</span></td>
              <td class="text-muted">{{ o.anneePublication | date:'yyyy' }}</td>
              <td class="text-muted">{{ o.caution | number:'1.2-2' }} €</td>
              <td>
                <div class="d-flex gap-2">
                  <button class="btn btn-sm btn-outline-primary" (click)="openEdit(o)">Modifier</button>
                  <button class="btn btn-sm btn-outline-danger" (click)="delete(o)">Supprimer</button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div *ngIf="showModal" class="modal d-block" style="background:rgba(0,0,0,0.5);">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{{ isEditing ? 'Modifier' : 'Ajouter' }} un ouvrage</h5>
          <button class="btn-close" (click)="showModal=false"></button>
        </div>
        <div class="modal-body">
          <div class="row g-2">
            <div class="col-12">
              <label class="form-label">Titre</label>
              <input class="form-control" [(ngModel)]="form.titre" />
            </div>
            <div class="col-6">
              <label class="form-label">Type</label>
              <select class="form-select" [(ngModel)]="form.type">
                <option value="LIVRE">Livre</option>
                <option value="REVUE">Revue</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Caution (€)</label>
              <input class="form-control" type="number" [(ngModel)]="form.caution" />
            </div>
            <div class="col-6">
              <label class="form-label">Année de publication</label>
              <input class="form-control" type="date" [(ngModel)]="form.anneePublication" />
            </div>
            <div class="col-6" *ngIf="form.type === 'LIVRE'">
              <label class="form-label">ISBN</label>
              <input class="form-control" [(ngModel)]="form.isbn" />
            </div>
            <div class="col-6" *ngIf="form.type === 'REVUE'">
              <label class="form-label">Numéro de volume</label>
              <input class="form-control" type="number" [(ngModel)]="form.numeroVolume" />
            </div>
            <div class="col-6" *ngIf="form.type === 'REVUE'">
              <label class="form-label">Date de parution</label>
              <input class="form-control" type="date" [(ngModel)]="form.dateDeParution" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" (click)="showModal=false">Annuler</button>
          <button class="btn btn-primary" (click)="save()">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

</div>
