
name: CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ['main']
    
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code 
          uses: actions/checkout@v4
          with:
            ref: ddb472bfb391cf81493e6cc1432ec78053c7afe5
        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '22.x'
        - name: Install dependencies
          run: npm install
        - name: Npm audit
          run: npm audit fix
        - name: Build Angular Project
          run: npm run build
        - name: Run tests
          run: npm run test