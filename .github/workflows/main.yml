
name: CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ['main']
    
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code 
          uses: actions/checkout@v3
        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '18.x'
        - name: Install pnpm
          run: npm install -g pnpm
        - name: Install dependencies
          run: pnpm install --frozen-lockfile
        - name: Build Angular Project
          run: pnpm build
        - name: Run tests
          run: pnpm tests