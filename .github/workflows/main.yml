name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read
      issues: write
      pull-requests: write
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Super-linter
        uses: super-linter/super-linter@v8.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_TYPESCRIPT: true
          VALIDATE_HTML: true
          VALIDATE_CSS: true
  build-angular:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm install

      - name: Npm audit fix
        run: npm audit fix

      - name: Build Angular project
        run: npm run build 

      - name: Run tests
        run: npm run test

  deploy-docs:
    runs-on: ubuntu-latest
    needs: build-angular
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Zensical
        run: pip install zensical
      - name: Remove existing site folder
        run: rm -rf site/
      - name: Build docs
        run: zensical build --clean
      - name: Debug structure
        run: |
          ls -la
          ls -la docs/
          cat zensical.yml 2>/dev/null || cat mkdocs.yml 2>/dev/null || echo "no config found"
      - name: Check site output
        run: ls -la site/ && cat site/index.html | head -5
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment